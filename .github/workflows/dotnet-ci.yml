name: .NET CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-test-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            webapi-demo.csproj
            global.json
            NuGet.Config
            tests/webapi-demo.Tests/webapi-demo.Tests.csproj

      - name: Restore dependencies
        run: dotnet restore webapi-demo.sln

      - name: Build
        run: dotnet build webapi-demo.sln --configuration Release --no-restore

      - name: Test with coverage
        run: |
          dotnet test webapi-demo.sln \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Find coverage report
        shell: bash
        run: |
          coverage_file=$(find "$PWD/TestResults" -name "coverage.cobertura.xml" | head -n 1)

          if [ -z "$coverage_file" ]; then
            echo "Coverage report not found."
            exit 1
          fi

          echo "COVERAGE_FILE=$coverage_file" >> "$GITHUB_ENV"

      - name: Install DeepSource CLI
        run: curl -fsSL https://cli.deepsource.com/install | BINDIR=./bin sh

      - name: Report coverage to DeepSource
        run: ./bin/deepsource report --analyzer test-coverage --key csharp --value-file "$COVERAGE_FILE" --use-oidc

      - name: Publish application
        run: dotnet publish webapi-demo.csproj --configuration Release --no-build --output ./publish

      - name: Upload published artifact
        uses: actions/upload-artifact@v7
        with:
          name: webapi-demo-publish
          path: ./publish

  build-docker-image:
    runs-on: ubuntu-latest
    needs: build-test-publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: webapi-demo:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
